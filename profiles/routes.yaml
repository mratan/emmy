# Emmy routes.yaml — within-model role routing (Phase 4 D-08, D-09)
# LiteLLM-shaped. Read by @emmy/ux/routes-loader.ts at session start + on /profile swap.
# See .planning/phases/04-gemma-4-profile-profile-system-maturity/04-RESEARCH.md §4.1 for
# the authoritative spec and .../04-CONTEXT.md D-08..D-12 for the locked decisions.
#
# Semantics:
#   - `default:` is applied to any turn whose role heuristic returns "default".
#   - `roles.<name>` is applied when the harness before_provider_request hook
#     classifies the turn as <name>. Role selection is TOOL-NAME or MESSAGE-REGEX
#     based — NEVER model-name based (D-19 "no model-name conditionals").
#   - Phase 4 ships Qwen variants only (D-08 default). Engine byte-identity is
#     enforced across sibling variants (tests/unit/test_variant_engine_byte_identity.py),
#     so switching between variants does NOT restart the vLLM engine — only
#     harness-side state (sampling, chat_template_kwargs, prompts) mutates per turn.
#
# 2026-04-28 daily-driver-switch note: the daily-driver default flipped from
# Qwen 35B-A3B v3.1 to Gemma 4 26B-A4B v2 (V-RESULTS-v8 matrix). The variants
# below are still Qwen-only and apply only when the loaded engine is Qwen
# (e.g. `pi-emmy --profile profiles/qwen3.6-35b-a3b/v3.1` or `/profile
# qwen3.6-35b-a3b` from the TUI). When Gemma is loaded — i.e. on the new
# default path — engine byte-identity prevents these Qwen variant overlays
# from applying meaningfully, so role routing degrades to a no-op until
# Gemma siblings are authored. Authoring Gemma plan/edit/critic siblings is
# Phase 5+ work (commented placeholder at the bottom of this file).

default: qwen3.6-35b-a3b@v3.1-default

roles:
  plan:   qwen3.6-35b-a3b@v3.1-reason
  edit:   qwen3.6-35b-a3b@v3.1-precise
  critic: qwen3.6-35b-a3b@v3.1-default
  # Phase 4.1 dense role token — opt-in. Routes to the Qwen 3.6 27B FP8 dense
  # sibling at v1.1 (operational RAM-headroom variant; v1 is the KV-ceiling
  # reference at gmu=0.86 — preserved for audit but uses ~110 GB UMA).
  # Default is unchanged; ops can hit this via the harness role classifier
  # when explicitly asked for "dense" in a turn, or by editing the role
  # mapping above. Gemma 4 31B dense (gemma-4-31b-it@v1.1) is the alternative
  # dense target — swap the value below if Gemma is preferred for a workload.
  dense:  qwen3.6-27b@v1.1

# Gemma 4 variants — Phase 5+ (deferred; Phase 4 SC-3 lands Qwen only per D-08).
# When Gemma 4 siblings are authored, uncomment and update. Cross-model routing
# (multiple models co-loaded) is HARNESS-08 v2 territory and NOT shipped in
# Phase 4 — Spark's 128 GB UMA forbids dual-load by default.
#
# gemma-4-26b-a4b-it-default: gemma-4-26b-a4b-it@v1
