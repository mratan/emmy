# profiles/qwen3.6-35b-a3b/v3/harness.yaml
# Phase 3 bump (2026-04-22) — adds context.compaction block (D-11..D-17) +
# tools.web_fetch.allowlist block (D-26..D-28). Provenance for every new
# default is in PROFILE_NOTES.md §"Phase 3 (Observability + Compaction +
# Lived-Experience)". v2 remains byte-identical to Phase 2 close; v3 is a
# sibling per Phase 1 D-02 immutability contract.

prompts:
  system: prompts/system.md                    # SP_OK canary uses this (Phase 1 D-07)
  edit_format: prompts/edit_format.md          # Hashline per-line hash-anchored (D-05..D-09)
  tool_descriptions: prompts/tool_descriptions.md  # 8 native tools; <2000 char budget per HARNESS-06
  use_system_role: true                         # Qwen honors system role; see Pitfall #6 / D-07
  prepend_system_text: ""                       # CONTEXT-04 layering done at runtime in @emmy/ux

context:
  max_input_tokens: 114688                       # = max_model_len(131072) - output_reserve(16384). See PROFILE_NOTES.md.
  include_repo_map: false                        # Phase 3 (Aider-style ranked symbol map)
  repo_map_max_tokens: 0                         # Phase 3
  default_pruning: head_tail                     # Legacy; superseded by compaction block below when configured
  compaction:
    # D-11..D-17 — per-profile compaction policy. See PROFILE_NOTES.md §Phase 3.
    soft_threshold_pct: 0.75                    # D-11 — crosses at ~86K of 114K; industry default (Claude Code / Cursor / Cline)
    preserve_recent_turns: 5                    # D-14 — pi 0.68 DEFAULT_COMPACTION_SETTINGS.keepRecentTokens=20000 ≈ 5 turns at 4K avg
    summarization_prompt_path: prompts/compact.md  # D-13 — emmy-authored; layers on pi's SUMMARIZATION_SYSTEM_PROMPT
    preserve_tool_results: error_only           # D-14 / D-15 — Pitfall #15 guardrail: stacktraces are the actual error signal
  memory:
    # Phase 04.4 plan 03 — filesystem memory tool config (LOCKED defaults from
    # CONTEXT.md §decisions). Runtime in packages/emmy-tools/src/memory/.
    enabled: true
    project_root: ".emmy/notes"          # relative to cwd; null = disable scope
    global_root: "~/.emmy/memory"        # ~-prefixed; null = disable scope
    read_at_session_start: true
    max_file_bytes: 65536                # per-file write cap
    max_total_bytes: 10485760            # per-scope cap (10 MiB)
    blocked_extensions: [".env", ".key", ".pem"]

tools:
  format: openai                                 # qwen3_coder parser emits OpenAI tool_calls
  schemas: tool_schemas/                         # 8 JSON files mirror registerNativeTools
  grammar:
    # D-11 LOCK: nested {path, mode} shape (B3/C3 fix). NOT a flattened string.
    path: grammars/tool_call.lark                # XGrammar Lark; reactive backstop only
    mode: reactive                               # D-11 production path; "disabled" reserved for Plan 08 SC-3 no-grammar baseline (D-14)
  per_tool_sampling:
    edit: { temperature: 0.0 }                   # Qwen team recommendation — deterministic structured output
    bash: { temperature: 0.0 }                   # Qwen team recommendation — deterministic command emission
    read: { temperature: 0.0 }                   # Emmy decision — file reads are deterministic
  web_fetch:
    # D-26 — default-deny allowlist; hostname-EXACT matching enforced at runtime
    # per Plan 03-06 (auditWebFetchUrl). CLAUDE.md "documentation reading allowed".
    allowlist:
      - docs.python.org
      - developer.mozilla.org
      - docs.vllm.ai
      - huggingface.co
      - docs.langfuse.com
    # Plan 03.1-02 D-35 — returned-URL bypass TTL (ms). URLs returned by a
    # recent web_search call are fetchable without allowlist entry for this
    # many ms. Exact URL match (NOT hostname substring) per T-03.1-02-02.
    # 0 disables the bypass entirely.
    search_bypass_ttl_ms: 300000
  web_search:
    # Plan 03.1-02 D-34 — SearxNG-backed web_search tool. base_url is loopback-
    # only; tool is NOT registered when enabled=false OR EMMY_WEB_SEARCH=off
    # OR EMMY_TELEMETRY=off. Rate-limited per-turn (T-03.1-02-03).
    enabled: true
    base_url: http://127.0.0.1:8888
    max_results_default: 10
    rate_limit_per_turn: 10
    timeout_ms: 10000

agent_loop:
  max_iterations: 25                             # Unchanged from v1; revisit at Phase 5 eval
  retry_on_unparseable_tool_call: 2              # Paired with SC-3 parse-rate gate (Plan 08); D-11 reactive retry budget
  retry_on_empty_response: 1                     # Pitfall #6 — one retry before surfacing as SP-delivery suspicion
  self_correction: enabled                       # ReAct self-correction on parseable tool errors

advanced_settings_whitelist:
  - reasoning_effort                             # Aider allowlist pattern; per-call without engine restart
  - thinking_budget                              # Aider allowlist pattern

subagents:
  enabled: true
  max_concurrent: 2                              # hardware-imposed cap
  long_context_serialize_threshold_tokens: 40000 # parent input > 40K → serialize
  default_memory_scope: "project"                # project | global | none
  personas:
    research:
      description: "Investigate a specific question without polluting parent's context."
      pattern: "persona"
      persona_dir: "subagents/research"
      tool_allowlist: ["read", "grep", "find", "ls"]
      model_override: null
      max_turns: 10
      persist_transcript: false
    code_reviewer:
      description: "Review a diff or file for bugs and style."
      pattern: "persona"
      persona_dir: "subagents/code-reviewer"
      tool_allowlist: ["read", "grep"]
      max_turns: 5
      persist_transcript: false
    bash_runner:
      description: "Execute a bash task and return the output."
      pattern: "lean"
      tool_allowlist: ["bash", "read"]
      max_turns: 3
      persist_transcript: false
