# profiles/qwen3.6-35b-a3b/v2/harness.yaml
# Phase 2 filled 2026-04-21 by Plan 02-07. Every field has provenance in
# PROFILE_NOTES.md §"Harness (Phase 2)". The nested tools.grammar.{path, mode}
# shape is the CONTEXT D-11 lock (B3/C3 fix). context.max_input_tokens is
# derived honestly from serving.yaml.engine.max_model_len - 16384 reserve
# (CONTEXT-05 / SC-5) via scripts/compute_max_input_tokens.ts.

prompts:
  system: prompts/system.md                    # SP_OK canary uses this (Phase 1 D-07)
  edit_format: prompts/edit_format.md          # Hashline per-line hash-anchored (D-05..D-09)
  tool_descriptions: prompts/tool_descriptions.md  # 8 native tools; <2000 char budget per HARNESS-06
  use_system_role: true                         # Qwen honors system role; see Pitfall #6 / D-07
  prepend_system_text: ""                       # CONTEXT-04 layering done at runtime in @emmy/ux

context:
  max_input_tokens: 114688                       # = max_model_len(131072) - output_reserve(16384). See PROFILE_NOTES.md.
  include_repo_map: false                        # Phase 3 (Aider-style ranked symbol map)
  repo_map_max_tokens: 0                         # Phase 3
  default_pruning: head_tail                     # Phase 2 default; compaction policy finalized in Phase 3

tools:
  format: openai                                 # qwen3_coder parser emits OpenAI tool_calls
  schemas: tool_schemas/                         # 8 JSON files mirror registerNativeTools
  grammar:
    # D-11 LOCK: nested {path, mode} shape (B3/C3 fix). NOT a flattened string.
    path: grammars/tool_call.lark                # XGrammar Lark; reactive backstop only
    mode: reactive                               # D-11 production path; "disabled" reserved for Plan 08 SC-3 no-grammar baseline (D-14)
  per_tool_sampling:
    edit: { temperature: 0.0 }                   # Qwen team recommendation — deterministic structured output
    bash: { temperature: 0.0 }                   # Qwen team recommendation — deterministic command emission
    read: { temperature: 0.0 }                   # Emmy decision — file reads are deterministic

agent_loop:
  max_iterations: 25                             # Unchanged from v1; revisit at Phase 5 eval
  retry_on_unparseable_tool_call: 2              # Paired with SC-3 parse-rate gate (Plan 08); D-11 reactive retry budget
  retry_on_empty_response: 1                     # Pitfall #6 — one retry before surfacing as SP-delivery suspicion
  self_correction: enabled                       # ReAct self-correction on parseable tool errors

advanced_settings_whitelist:
  - reasoning_effort                             # Aider allowlist pattern; per-call without engine restart
  - thinking_budget                              # Aider allowlist pattern
