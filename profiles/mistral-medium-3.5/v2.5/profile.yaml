  description: "Mistral Medium 3.5 128B \u2014 Phase 04.7-02 followup E3 (boot-OOM\
    \ diagnostic). v2.5 = v2.4 + new airgap_patches/mistral3_runai_streamer_remap.py\
    \ that wraps RunaiModelStreamerLoader._get_weights_iterator with the same language_model.\
    \ prefix-stripping logic that mistral3_safetensors_remap.py applies to DefaultModelLoader.get_all_weights.\
    \ E2 (v2.4) showed that runai_streamer extends BaseModelLoader directly, bypassing\
    \ the v2.3/v2.4 patch and crashing at KeyError: 'language_model.layers.55.self_attn.qkv_proj.input_global_scale'\
    \ before any weights streamed. v2.5 fixes this so Q3 can actually be tested: does\
    \ runai_streamer's memory_limit=4 GiB cap bring the boot peak below the 43 GB\
    \ OOM threshold? Predicted outcomes \u2014 peak \u2248 25-30 GB \u2192 Q2 CONFIRMED\
    \ (loader buffer was the issue); peak \u2248 43 GB \u2192 loader buffer was NOT\
    \ the issue (next probe: KV pre-allocation). All other v2.4 settings unchanged."
