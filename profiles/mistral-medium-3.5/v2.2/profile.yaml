  description: "Mistral Medium 3.5 128B \u2014 Phase 04.7 alternate, v2.2 lazy-load\
    \ OOM fix. v2.2 = v2.1 + engine.safetensors_load_strategy: lazy (single-byte change\
    \ to serving.yaml). v2.1 boot OOM-killed 11 times on 2026-05-05 (gmu=0.84 and\
    \ gmu=0.81 alike) at transient ~42-43 GB anon-rss burst during weight load \u2014\
    \ vLLM's default safetensors loader (None strategy) auto-prefetches into the page\
    \ cache when the checkpoint fits in 90% of available RAM, doubling the memory\
    \ pressure on 128 GB UMA. `lazy` forces mmap with no auto-prefetch: pages are\
    \ file-rss (page-cache-backed), not anon-rss, and stream into the GPU pool on\
    \ demand. v2.1 properties carry forward unchanged: Dense 128B via RecViking NVFP4\
    \ (compressed-tensors nvfp4-pack-quantized; ~80 GB on disk), SP_OK canary removed\
    \ from system.md. Eval-only opt-in (`/profile mistral-medium-3.5`). NOT a daily-driver,\
    \ NOT a routes.yaml participant, NOT an ask_claude target."
