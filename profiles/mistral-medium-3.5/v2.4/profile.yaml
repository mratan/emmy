  description: "Mistral Medium 3.5 128B \u2014 Phase 04.7-02 followup E2 (boot-OOM\
    \ diagnostic). v2.4 = v2.3 with one variable change: load_format swapped from\
    \ `auto` (which resolved internally to safetensors) to `runai_streamer` with model_loader_extra_config={\\\
    \"memory_limit\\\": 4294967296} (4 GiB cap on host CPU staging buffer). E1 (v2.3)\
    \ falsified the CUDA-graph-capture + frag + gmu hypotheses but the 43 GB anon-rss\
    \ boot peak persisted with linear ~190 MB/s growth \u2014 consistent with safetensors\
    \ loader accumulating CPU-side torch.Tensor objects. v2.4 tests Q2 (\"is the 43\
    \ GB peak loader-caused?\") by swapping ONLY the loader. If boot peak < 20 GB,\
    \ loader hypothesis CONFIRMED \u2192 ship v2.4. If peak \u2248 43 GB, hypothesis\
    \ FALSIFIED \u2192 next experiment will probe KV pre-allocation. All other v2.3\
    \ settings carry forward unchanged."
