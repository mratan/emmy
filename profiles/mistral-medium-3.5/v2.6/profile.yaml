  description: "Mistral Medium 3.5 128B \u2014 Phase 04.7-02 followup E3b (KV-fit\
    \ at 128K). v2.6 = v2.5 + single variable change: gpu_memory_utilization 0.80\
    \ \u2192 0.84. E3 (v2.5) confirmed that runai_streamer with memory_limit=4 GiB\
    \ caps boot peak at 5.5 GiB (88% reduction from safetensors' 43 GB). Weight load\
    \ succeeded; KV init then failed with vLLM diagnostic: '22.0 GiB KV cache needed,\
    \ 21.21 GiB available, estimated max_model_len=126368'. Per the v2 history (~0.18\
    \ GiB KV per 0.01 gmu), +0.79 GiB needs +0.044 gmu. v2.6 jumps to 0.84 (matches\
    \ v2.1's gmu) for a ~0.7 GiB margin over the 22 GiB target. Boot peak expected\
    \ to remain ~5.5 GiB because runai_streamer's memory_limit caps the loader buffer\
    \ independently of gmu. All other v2.5 settings unchanged."
